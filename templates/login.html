<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Tajawal', sans-serif;
    background: #0d0d0d;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background-image: radial-gradient(ellipse at 20% 50%, #1a0533 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 20%, #001a33 0%, transparent 60%);
  }
  .card {
    background: #141414;
    border: 1px solid #2a2a2a;
    border-radius: 16px;
    padding: 48px 40px;
    width: 360px;
    box-shadow: 0 0 60px rgba(88,101,242,0.1);
  }
  .logo { font-size: 28px; font-weight: 900; color: #5865F2; text-align: center; margin-bottom: 6px; }
  .subtitle { color: #666; text-align: center; font-size: 14px; margin-bottom: 36px; }
  label { display: block; color: #aaa; font-size: 13px; margin-bottom: 8px; font-weight: 700; }
  input {
    width: 100%; background: #1e1e1e; border: 1px solid #333; border-radius: 8px;
    padding: 12px 16px; color: #fff; font-family: 'Tajawal', sans-serif;
    font-size: 15px; margin-bottom: 20px; transition: border-color 0.2s; text-align: right;
  }
  input:focus { outline: none; border-color: #5865F2; }
  button {
    width: 100%; background: #5865F2; color: white; border: none; border-radius: 8px;
    padding: 14px; font-size: 16px; font-family: 'Tajawal', sans-serif;
    font-weight: 700; cursor: pointer; transition: background 0.2s;
  }
  button:hover { background: #4752C4; }
  .error { color: #ed4245; font-size: 13px; text-align: center; margin-top: 12px; display: none; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">⚙️ لوحة التحكم</div>
  <div class="subtitle">سجّل دخولك للمتابعة</div>
  <label>اسم المستخدم</label>
  <input type="text" id="username" placeholder="اسم المستخدم">
  <label>كلمة السر</label>
  <input type="password" id="password" placeholder="كلمة السر">
  <button onclick="login()">دخول</button>
  <div class="error" id="error">اسم المستخدم أو كلمة السر خاطئة</div>
</div>
<script>
async function login() {
  const res = await fetch('/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ username: document.getElementById('username').value, password: document.getElementById('password').value })
  });
  const data = await res.json();
  if (data.success) window.location.reload();
  else document.getElementById('error').style.display = 'block';
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
